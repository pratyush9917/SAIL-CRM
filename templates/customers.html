{% extends 'base.html' %}
{% block title %}Customers – SAIL CRM{% endblock %}
{% block page_title %}Customer Management{% endblock %}
{% block content %}
<div class="toolbar">
  <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search customers…" oninput="loadCustomers()"></div>
  <select id="typeFilter" onchange="loadCustomers()" style="padding:7px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;">
    <option value="">All Types</option>
    <option>Trader</option><option>Consumer</option><option>Project</option><option>Distributor</option>
  </select>
  <div class="spacer"></div>
  <button class="btn btn-primary" onclick="openModal('addModal')"><i class="fas fa-plus"></i> Add Customer</button>
</div>
<div class="card">
  <div class="table-wrap">
    <table id="custTable">
      <thead><tr><th>Code</th><th>Company</th><th>Type</th><th>Contact</th><th>City</th><th>RPI Score</th><th>Category</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="custBody"><tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add New Customer</span>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group full"><label>Company Name *</label><input id="f-name" placeholder="e.g. Tata Projects Ltd"></div>
      <div class="form-group"><label>Customer Type</label>
        <select id="f-type"><option>Trader</option><option>Consumer</option><option>Project</option><option>Distributor</option></select>
      </div>
      <div class="form-group"><label>Contact Person</label><input id="f-cp" placeholder="Name"></div>
      <div class="form-group"><label>Designation</label><input id="f-des" placeholder="GM Procurement"></div>
      <div class="form-group"><label>Email</label><input id="f-email" type="email" placeholder="email@company.com"></div>
      <div class="form-group"><label>Phone</label><input id="f-phone" placeholder="98XXXXXXXX"></div>
      <div class="form-group"><label>City</label><input id="f-city" placeholder="Mumbai"></div>
      <div class="form-group"><label>State</label><input id="f-state" placeholder="Maharashtra"></div>
      <div class="form-group"><label>GST Number</label><input id="f-gst" placeholder="27AAACX1234C1Z5"></div>
      <div class="form-group"><label>Assigned Executive</label><input id="f-exec" placeholder="exec1"></div>
      <div class="form-group full"><label>Address</label><textarea id="f-addr" rows="2" placeholder="Full address…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addCustomer()">Add Customer</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function loadCustomers() {
  const q = document.getElementById('searchInput').value;
  const type = document.getElementById('typeFilter').value;
  fetch(`/api/customers?q=${encodeURIComponent(q)}&type=${encodeURIComponent(type)}`)
    .then(r=>r.json()).then(data=>{
      const tbody = document.getElementById('custBody');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">No customers found</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(c=>`
        <tr>
          <td class="mono">${c.customer_code}</td>
          <td><a href="/customer/${c.id}/profile" style="color:var(--blue);font-weight:500">${c.company_name}</a></td>
          <td>${c.customer_type||'–'}</td>
          <td>${c.contact_person||'–'}</td>
          <td>${c.city||'–'}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="rpi-bar" style="width:60px"><div class="rpi-fill" style="width:${c.rpi_score}%;background:${rpiColor(c.rpi_score)}"></div></div>
              <span class="mono" style="font-size:12px">${c.rpi_score}</span>
            </div>
          </td>
          <td><span class="badge badge-${c.rpi_category.toLowerCase()}">${c.rpi_category}</span></td>
          <td><span class="badge badge-${c.status.toLowerCase()}">${c.status}</span></td>
          <td>
            <a href="/customer/${c.id}/profile" class="btn btn-outline btn-sm"><i class="fas fa-eye"></i></a>
          </td>
        </tr>`).join('');
    });
}
function rpiColor(score) {
  if (score >= 85) return '#3b82f6';
  if (score >= 70) return '#f59e0b';
  if (score >= 50) return '#94a3b8';
  return '#e2e8f0';
}
function addCustomer() {
  const data = {
    company_name: document.getElementById('f-name').value,
    customer_type: document.getElementById('f-type').value,
    contact_person: document.getElementById('f-cp').value,
    designation: document.getElementById('f-des').value,
    email: document.getElementById('f-email').value,
    phone: document.getElementById('f-phone').value,
    city: document.getElementById('f-city').value,
    state: document.getElementById('f-state').value,
    gst_number: document.getElementById('f-gst').value,
    assigned_executive: document.getElementById('f-exec').value,
    address: document.getElementById('f-addr').value,
  };
  if (!data.company_name) { toast('Company name is required', 'error'); return; }
  fetch('/api/customers', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) })
    .then(r=>r.json()).then(d=>{
      if (d.success) { closeModal('addModal'); loadCustomers(); toast('Customer added successfully'); }
    });
}
loadCustomers();
</script>
{% endblock %}
